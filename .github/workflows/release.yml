name: Release (automatic version from manifest)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release from manifest version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest.json
        id: manifest
        run: |
          version="$(jq -r '.version' custom_components/solax_x1micro/manifest.json)"
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not read .version from manifest.json"
            exit 1
          fi

          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.manifest.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.manifest.outputs.tag }} already exists. Aborting."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "${{ steps.manifest.outputs.tag }}" -m "Release ${{ steps.manifest.outputs.tag }}"
          git push origin "${{ steps.manifest.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.tag }}
          generate_release_notes: true
